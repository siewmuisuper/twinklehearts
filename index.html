<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twinkle Hearts — Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --white: #ffffff;
    --pink: #c0392b;
    --pink-light: #fdf0ee;
    --teal: #2d6a5a;
    --teal-light: #e8f5f1;
    --ink: #1a1a1a;
    --mid: #888;
    --border: #e8e0d5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  .app { max-width: 680px; margin: 0 auto; padding: 0 0 60px; }

  /* Header */
  .header {
    padding: 28px 20px 0;
    margin-bottom: 20px;
  }
  .header-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--ink);
  }
  .header-logo span { color: var(--pink); }

  /* Search */
  .search-section { padding: 0 20px 6px; }
  .search-wrap { position: relative; margin-bottom: 6px; }
  .search-wrap input {
    width: 100%;
    padding: 14px 44px 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .search-wrap input:focus { border-color: var(--pink); }
  .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
  .search-hint { font-size: 12px; color: var(--mid); padding: 0 4px; margin-bottom: 8px; }
  .search-disclaimer { font-size: 11.5px; color: var(--mid); padding: 0 4px; margin-bottom: 20px; line-height: 1.5; }

  /* Dropdown */
  .name-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    max-height: 220px; overflow-y: auto; z-index: 100; display: none;
  }
  .name-dropdown.show { display: block; }
  .name-option {
    padding: 11px 16px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .name-option:last-child { border-bottom: none; }
  .name-option:hover { background: var(--pink-light); color: var(--pink); }

  /* Results */
  .results { padding: 0 20px; }

  .results-header {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 14px;
  }
  .results-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .results-title em { color: var(--pink); font-style: normal; }
  .results-count { font-size: 13px; color: var(--mid); font-weight: 500; }

  /* Pills */
  .pills { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border); background: var(--white);
  }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pill-dot.pink { background: var(--pink); }
  .pill-dot.teal { background: var(--teal); }

  /* Nudge */
  .nudge {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 100px;
    background: #eef4ff; border: 1.5px solid #b8d0f8;
    font-size: 13px; color: #2a4a8a;
    margin-bottom: 20px;
  }

  /* Milestone */
  .milestone {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 100px;
    background: #fef9ec; border: 1.5px solid #f0d870;
    font-size: 13px; font-weight: 500; color: #7a5f10;
    margin-bottom: 20px;
  }

  /* Year group */
  .year-group { margin-bottom: 20px; }
  .year-divider {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .year-divider::before, .year-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .year-divider span { font-size: 13px; color: var(--mid); font-weight: 500; }

  /* Event card */
  .event-card {
    background: var(--white); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; justify-content: space-between;
    align-items: center; gap: 12px;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .event-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .event-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .event-meta span { font-size: 12px; color: var(--mid); }
  .attended-badge {
    flex-shrink: 0; padding: 5px 12px; border-radius: 100px;
    background: var(--teal-light); color: var(--teal);
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }

  /* Share button */
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; border-radius: 14px;
    background: #25D366; border: none; color: white;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 20px; margin-bottom: 8px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .share-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .share-note { font-size: 11px; color: var(--mid); text-align: center; margin-bottom: 20px; }
  .state-msg { text-align: center; padding: 48px 20px; color: var(--mid); font-size: 14px; line-height: 1.6; }
  .state-msg .icon { font-size: 36px; margin-bottom: 12px; }

  /* Share button */
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; margin-top: 24px;
    padding: 14px; border-radius: 14px;
    background: #25D366; border: none; color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(37,211,102,0.3);
  }
  .share-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .share-note {
    text-align: center; font-size: 11.5px;
    color: var(--mid); margin-top: 8px; margin-bottom: 8px;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.1); border-top-color: var(--pink);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-logo">Twinkle <span>Hearts</span> 💗</div>
  </div>

  <div class="search-section">
    <div class="search-wrap">
      <input type="text" id="name-input" placeholder="Type your name…" autocomplete="off">
      <span class="search-icon">🔍</span>
      <div class="name-dropdown" id="name-dropdown"></div>
    </div>
    <p class="search-hint">Type your full name. If the records are not correct, alert Siew Mui 😝</p>
    <p class="search-disclaimer">📋 Records shown are from 2023 onwards. We know many of you have been with us much longer — thank you! 💗</p>
  </div>

  <div class="results" id="results"></div>

</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAePMoZGB8njdfZiqqU0C31MNmKuNWM7vtwbwDNPaKvBJqNzK_NuakMxSNEj0CnqjUOA/exec';
const CURRENT_YEAR    = new Date().getFullYear().toString();

let allNames     = [];
let selectedName = null;

// Load names on page open
loadNames();

async function loadNames() {
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getNames`);
    const data = await res.json();
    if (data.names) allNames = data.names;
  } catch(e) {
    console.warn('Could not load names', e);
  }
}

// Search input
const nameInput    = document.getElementById('name-input');
const nameDropdown = document.getElementById('name-dropdown');

nameInput.addEventListener('input', () => {
  const q = nameInput.value.trim().toLowerCase();
  selectedName = null;
  if (q.length < 1) { nameDropdown.classList.remove('show'); return; }
  const matches = allNames.filter(n => n.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { nameDropdown.classList.remove('show'); return; }
  nameDropdown.innerHTML = matches.map(n =>
    `<div class="name-option" onclick="pickName('${n.replace(/'/g, "\\'")}')">${n}</div>`
  ).join('');
  nameDropdown.classList.add('show');
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) nameDropdown.classList.remove('show');
});

async function pickName(name) {
  selectedName = name;
  nameInput.value = name;
  nameDropdown.classList.remove('show');
  logSearch(name);
  await loadRecords(name);
}

// Log search (silently, non-blocking)
async function logSearch(name) {
  try {
    await fetch(`${APPS_SCRIPT_URL}?action=logSearch&name=${encodeURIComponent(name)}`);
  } catch(e) {
    // Silently fail — logging should never break the app
  }
}

// Fetch records
async function loadRecords(name) {
  const el = document.getElementById('results');
  el.innerHTML = `<div class="state-msg"><span class="spinner"></span>Loading…</div>`;
  try {
    const res     = await fetch(`${APPS_SCRIPT_URL}?action=getRecords&name=${encodeURIComponent(name)}`);
    const data    = await res.json();
    renderRecords(name, data.records || []);
  } catch(e) {
    el.innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><p>Could not load records.<br>Please try again.</p></div>`;
  }
}

// Render
function renderRecords(name, records) {
  const el     = document.getElementById('results');
  const total  = records.length;
  const thisYr = records.filter(r => String(r.Year) === CURRENT_YEAR).length;
  const years  = [...new Set(records.map(r => r.Year).filter(Boolean))];

  if (!total) {
    el.innerHTML = `<div class="state-msg"><div class="icon">💗</div><p>No records found for <strong>${name}</strong>.<br>We look forward to seeing you at our next event!</p></div>`;
    return;
  }

  // Milestone
  const MILESTONES = [5, 10, 20, 30, 40, 50, 75, 100];
  const nextMilestone = MILESTONES.find(m => m > total);
  const nudge = nextMilestone
    ? `<div class="nudge">🎯 You are <strong>${nextMilestone - total} event${nextMilestone - total !== 1 ? 's' : ''}</strong> away from your next milestone of <strong>${nextMilestone} events</strong>!</div>`
    : '';

  let milestone = '';
  if      (total >= 75) milestone = `<div class="milestone">💎 <strong>Heart of Gold</strong> — ${total} events. Extraordinary!</div>`;
  else if (total >= 50) milestone = `<div class="milestone">🏆 <strong>Champion Volunteer</strong> — ${total} events. You're a legend!</div>`;
  else if (total >= 40) milestone = `<div class="milestone">🏅 <strong>Committed Heart</strong> — ${total} events and going strong!</div>`;
  else if (total >= 30) milestone = `<div class="milestone">🎖️ <strong>Rising Champion</strong> — ${total} events, amazing!</div>`;
  else if (total >= 20) milestone = `<div class="milestone">⭐ <strong>Star Volunteer</strong> — ${total} events and counting!</div>`;
  else if (total >= 10) milestone = `<div class="milestone">💛 <strong>Dedicated Heart</strong> — ${total} events attended!</div>`;
  else if (total >= 5)  milestone = `<div class="milestone">🌱 <strong>Growing Heart</strong> — ${total} events, keep it up!</div>`;

  // Group by year
  const byYear = {};
  records.forEach(r => {
    const yr = String(r.Year || 'Unknown');
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(r);
  });

  const yearHTML = Object.entries(byYear)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([yr, evts]) => `
      <div class="year-group">
        <div class="year-divider"><span>${yr}</span></div>
        ${evts.map((r, i) => `
          <div class="event-card" style="animation-delay:${Math.min(i * 0.04, 0.5)}s">
            <div>
              <div class="event-name">${r.Event || '—'}</div>
              <div class="event-meta">
                <span>📅 ${fmtDate(r.Date)}</span>
                ${r.Beneficiary ? `<span>📍 ${r.Beneficiary}</span>` : ''}
              </div>
            </div>
            <div class="attended-badge">✓ Attended</div>
          </div>`
        ).join('')}
      </div>`
    ).join('');

  el.innerHTML = `
    ${milestone}
    ${nudge}
    <div class="results-header">
      <div class="results-title">Records for <em>${name}</em></div>
      <div class="results-count">${total} entries</div>
    </div>
    <div class="pills">
      <div class="pill"><div class="pill-dot pink"></div>${total} attended</div>
      <div class="pill"><div class="pill-dot teal"></div>${years.length} year${years.length !== 1 ? 's' : ''}</div>
      <div class="pill"><div class="pill-dot pink"></div>${thisYr} in ${CURRENT_YEAR}</div>
    </div>
    ${yearHTML}
    <button class="share-btn" onclick="shareRecord('${name.replace(/'/g, "\\'")}', ${total}, ${years.length}, ${thisYr})">💬 Share my volunteering record</button>
    <p class="share-note">Opens WhatsApp with a summary of your volunteering journey</p>
  `;
}

function shareRecord(name, total, yearsActive, thisYr) {
  // Get milestone tier
  const tier =
    total >= 75 ? '💎 Heart of Gold' :
    total >= 50 ? '🏆 Champion Volunteer' :
    total >= 40 ? '🏅 Committed Heart' :
    total >= 30 ? '🎖️ Rising Champion' :
    total >= 20 ? '⭐ Star Volunteer' :
    total >= 10 ? '💛 Dedicated Heart' :
    total >= 5  ? '🌱 Growing Heart' : '💗 Volunteer';

  const msg =
`💗 *Twinkle Hearts Volunteer*

Hi! I've been volunteering with Twinkle Hearts — bringing joy to our elderly friends at nursing homes.

${tier}
📊 ${total} events attended
📅 Active for ${yearsActive} year${yearsActive !== 1 ? 's' : ''}
🌟 ${thisYr} events in ${CURRENT_YEAR}

Check your own volunteering record at:
https://siewmuisuper.github.io/twinklehearts/

_Records shown are from 2023 onwards_ 💗`;

  const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-SG', { day: 'numeric', month: 'short', year: 'numeric' });
}
</script>
</body>
</html>
