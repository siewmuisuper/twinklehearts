<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twinkle Hearts — Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --white: #ffffff;
    --pink: #c0392b;
    --pink-light: #fdf0ee;
    --teal: #2d6a5a;
    --teal-light: #e8f5f1;
    --ink: #1a1a1a;
    --mid: #888;
    --border: #e8e0d5;
    --card-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }


  /* ===== APP ===== */
  #app-screen {  max-width: 680px; margin: 0 auto; padding: 0 0 60px; }

  /* Header */
  .app-header {
    padding: 28px 20px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .app-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--ink);
  }
  .app-logo span { color: var(--pink); }
  .signout-btn {
    font-size: 13px; color: var(--mid); background: none;
    border: 1.5px solid var(--border); border-radius: 20px;
    padding: 5px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: color 0.2s, border-color 0.2s;
  }
  .signout-btn:hover { color: var(--pink); border-color: var(--pink); }

  /* Tabs */
  .tabs {
    display: flex; padding: 20px 20px 0; gap: 0;
    border-bottom: 1.5px solid var(--border); margin: 0 0 24px;
  }
  .tab {
    padding: 12px 4px; margin-right: 24px;
    font-size: 15px; font-weight: 500; color: var(--mid);
    cursor: pointer; border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px; transition: color 0.2s, border-color 0.2s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active { color: var(--pink); border-bottom-color: var(--pink); font-weight: 600; }
  .tab-icon { margin-right: 6px; }

  /* ===== SEARCH TAB ===== */
  #tab-search { padding: 0 20px; }

  .search-wrap {
    position: relative; margin-bottom: 6px;
  }
  .search-wrap input {
    width: 100%; padding: 14px 44px 14px 16px;
    border: 1.5px solid var(--border); border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--ink); background: var(--white); outline: none;
    transition: border-color 0.2s;
    box-shadow: var(--card-shadow);
  }
  .search-wrap input:focus { border-color: var(--pink); }
  .search-icon {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: var(--mid); font-size: 16px;
    pointer-events: none;
  }

  .search-hint {
    font-size: 12px; color: var(--mid); margin-bottom: 20px;
    padding: 0 4px;
  }

  /* Name dropdown */
  .name-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    max-height: 220px; overflow-y: auto; z-index: 100; display: none;
  }
  .name-dropdown.show { display: block; }
  .name-option {
    padding: 11px 16px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .name-option:last-child { border-bottom: none; }
  .name-option:hover { background: var(--pink-light); color: var(--pink); }

  /* Results header */
  .results-header {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 14px;
  }
  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--ink);
  }
  .results-title em { color: var(--pink); font-style: normal; }
  .results-count { font-size: 13px; color: var(--mid); font-weight: 500; }

  /* Pills */
  .pills { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500; border: 1.5px solid var(--border);
    background: var(--white);
  }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pill-dot.pink { background: var(--pink); }
  .pill-dot.teal { background: var(--teal); }
  .pill strong { font-weight: 600; }

  /* Milestone */
  .milestone-pill {
    display: none; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 100px;
    background: #fef9ec; border: 1.5px solid #f0d870;
    font-size: 13px; font-weight: 500; color: #7a5f10;
    margin-bottom: 20px;
  }
  .milestone-pill.show { display: flex; }

  /* Year group */
  .year-group { margin-bottom: 24px; }
  .year-divider {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .year-divider::before, .year-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .year-label-text { font-size: 13px; color: var(--mid); font-weight: 500; }

  /* Event card */
  .event-card {
    background: var(--white); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 10px;
    box-shadow: var(--card-shadow);
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .event-card-left { flex: 1; }
  .event-card-name { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .event-card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .event-meta-item { font-size: 12px; color: var(--mid); display: flex; align-items: center; gap: 4px; }

  .attended-badge {
    flex-shrink: 0; padding: 5px 12px; border-radius: 100px;
    background: var(--teal-light); color: var(--teal);
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--mid); }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }







  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.1); border-top-color: var(--pink);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row { text-align: center; padding: 32px; color: var(--mid); font-size: 14px; }
</style>
</head>
<body>

<!-- APP -->
<div id="app-screen">
  <div class="app-header">
    <div class="app-logo">Twinkle <span>Hearts</span> 💗</div>
  </div>


  <!-- SEARCH TAB -->
  <div id="tab-search">
    <div class="search-wrap">
      <input type="text" id="name-input" placeholder="Type your name…" autocomplete="off">
      <span class="search-icon">🔍</span>
      <div class="name-dropdown" id="name-dropdown"></div>
    </div>
    <p class="search-hint">Type your full name. If the records are not correct, alert Siew Mui 😝</p>
    <div id="search-results"></div>
  </div>

  </div>
</div>

<script>
// ============================================================
const SUPABASE_URL      = 'https://vkmafkzoocdlkgjubwgb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrbWFma3pvb2NkbGtnanVid2diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTUxODAsImV4cCI6MjA4ODUzMTE4MH0.rNDMOJNzWQprzUhm5yROLQIFVbBh7-BRQdGk5b8F17Y';
const TABLE             = 'TwinkleHearts_Attendance2026';
const CURRENT_YEAR      = new Date().getFullYear().toString();
// ============================================================

let allNames     = [];
let selectedName = null;





// ---- Init ----
initApp();
async function initApp() {
  await loadNames();
}

// ---- Load all names ----
async function loadNames() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=Name&Attended=eq.True`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    const data = await res.json();
    const nameSet = new Set(data.map(r => r.Name?.trim()).filter(Boolean));
    allNames = [...nameSet].sort((a,b) => a.localeCompare(b));
  } catch(e) { console.warn('Name load failed', e); }
}

}

// ---- Name search dropdown ----
const nameInput    = document.getElementById('name-input');
const nameDropdown = document.getElementById('name-dropdown');

nameInput.addEventListener('input', () => {
  const q = nameInput.value.trim().toLowerCase();
  selectedName = null;
  document.getElementById('search-results').innerHTML = '';
  if (q.length < 1) { nameDropdown.classList.remove('show'); return; }
  const matches = allNames.filter(n => n.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { nameDropdown.classList.remove('show'); return; }
  nameDropdown.innerHTML = matches.map(n =>
    `<div class="name-option" onclick="selectName('${n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${n}</div>`
  ).join('');
  nameDropdown.classList.add('show');
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) nameDropdown.classList.remove('show');
});

async function selectName(name) {
  selectedName = name;
  nameInput.value = name;
  nameDropdown.classList.remove('show');
  await loadVolunteerRecords(name);
}

// ---- Fetch & render volunteer records ----
async function loadVolunteerRecords(name) {
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = `<div class="loading-row"><span class="spinner"></span>Loading…</div>`;

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?Name=eq.${encodeURIComponent(name)}&Attended=eq.True&order=Date.desc&select=Event,Date,Year,Beneficiary`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const records = await res.json();
    renderVolunteerRecords(name, records);
  } catch(e) {
    resultsEl.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Could not load records.<br>Please try again.</p></div>`;
    console.error(e);
  }
}

function renderVolunteerRecords(name, records) {
  const el     = document.getElementById('search-results');
  const total  = records.length;
  const thisYr = records.filter(r => String(r.Year) === CURRENT_YEAR).length;
  const years  = [...new Set(records.map(r => r.Year).filter(Boolean))];

  if (!total) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">💗</div><p>No records found for <strong>${name}</strong>.<br>We look forward to seeing you at our next event!</p></div>`;
    return;
  }

  // Milestone
  let milestoneHTML = '';
  if      (total >= 50) milestoneHTML = `<div class="milestone-pill show">🏆 <strong>Champion Volunteer</strong> — ${total} events! You're a legend.</div>`;
  else if (total >= 25) milestoneHTML = `<div class="milestone-pill show">⭐ <strong>Star Volunteer</strong> — ${total} events and counting!</div>`;
  else if (total >= 10) milestoneHTML = `<div class="milestone-pill show">💛 <strong>Dedicated Heart</strong> — ${total} events attended!</div>`;
  else if (total >= 5)  milestoneHTML = `<div class="milestone-pill show">🌱 <strong>Growing Heart</strong> — ${total} events, keep it up!</div>`;

  // Group by year
  const byYear = {};
  records.forEach(r => {
    const yr = r.Year || 'Unknown';
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(r);
  });

  const yearGroupsHTML = Object.entries(byYear)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .map(([yr, evts]) => `
      <div class="year-group">
        <div class="year-divider"><span class="year-label-text">${yr}</span></div>
        ${evts.map((r, i) => `
          <div class="event-card" style="animation-delay:${Math.min(i*0.04,0.5)}s">
            <div class="event-card-left">
              <div class="event-card-name">${r.Event || '—'}</div>
              <div class="event-card-meta">
                <span class="event-meta-item">📅 ${fmtDate(r.Date)}</span>
                ${r.Beneficiary ? `<span class="event-meta-item">📍 ${r.Beneficiary}</span>` : ''}
              </div>
            </div>
            <div class="attended-badge">✓ Attended</div>
          </div>`
        ).join('')}
      </div>`
    ).join('');

  el.innerHTML = `
    ${milestoneHTML}
    <div class="results-header">
      <div class="results-title">Records for <em>${name}</em></div>
      <div class="results-count">${total} entries</div>
    </div>
    <div class="pills">
      <div class="pill"><div class="pill-dot pink"></div><strong>${total}</strong> attended</div>
      <div class="pill"><div class="pill-dot teal"></div><strong>${years.length}</strong> year${years.length !== 1 ? 's' : ''}</div>
      <div class="pill"><div class="pill-dot pink"></div><strong>${thisYr}</strong> in ${CURRENT_YEAR}</div>
    </div>
    ${yearGroupsHTML}
  `;
}

    );
    allRecords = await res.json();
  } catch(e) {
  }
}

// ---- Helpers ----
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-SG', { day:'numeric', month:'short', year:'numeric' });
}
</script>
</body>
</html>
